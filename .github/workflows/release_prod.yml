name: Build and publish to PyPI and GHCR

on:
  workflow_dispatch:
  release:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: "${{ github.repository_owner }}/reqstool"

jobs:
  check-release:
    name: Reuse check release
    uses: ./.github/workflows/check_release.yml

  build:
    name: Reuse build
    uses: ./.github/workflows/build.yml

  publish-to-pypi:
    needs:
      - check-release
      - build
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://pypi.org/p/reqstool
    permissions:
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      # Download artifacts from the build job
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          sign-artifacts: true
          skip-existing: true

  publish-image-to-ghcr:
    if: github.event_name == 'release'
    needs:
      - publish-to-pypi
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/publish-image.yml
    with:
      version: ${{ github.event.release.tag_name }}

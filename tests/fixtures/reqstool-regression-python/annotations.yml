# yaml-language-server: $schema=https://raw.githubusercontent.com/reqstool/reqstool-client/main/src/reqstool/resources/schemas/v1/annotations.schema.json
---
requirement_annotations:
  implementations:
    REQ_PASS:
      - elementKind: "CLASS"
        fullyQualifiedName: "requirements_example.RequirementsExample"
    REQ_MANUAL_FAIL:
      - elementKind: "METHOD"
        fullyQualifiedName: "requirements_example.RequirementsExample.calculate_total"
    REQ_FAILING_TEST:
      - elementKind: "METHOD"
        fullyQualifiedName: "requirements_example.RequirementsExample.validate_email"
    REQ_SKIPPED_TEST:
      - elementKind: "METHOD"
        fullyQualifiedName: "requirements_example.RequirementsExample.send_sms"
    REQ_MISSING_TEST:
      - elementKind: "METHOD"
        fullyQualifiedName: "requirements_example.RequirementsExample.log_action"
    REQ_OBSOLETE:
      - elementKind: "METHOD"
        fullyQualifiedName: "requirements_example.RequirementsExample.legacy_greet"
  tests:
    SVC_010:
      - elementKind: "METHOD"
        fullyQualifiedName: "test_svcs.test_greeting_message"
      - elementKind: "METHOD"
        fullyQualifiedName: "test_svcs_it.test_greeting_integration"
    SVC_020:
      - elementKind: "METHOD"
        fullyQualifiedName: "test_svcs.test_calculate_total"
    SVC_030:
      - elementKind: "METHOD"
        fullyQualifiedName: "test_svcs.test_export_report_design"
    SVC_040:
      - elementKind: "METHOD"
        fullyQualifiedName: "test_svcs.test_email_validation"
    SVC_050:
      - elementKind: "METHOD"
        fullyQualifiedName: "test_svcs.test_sms_notification"
